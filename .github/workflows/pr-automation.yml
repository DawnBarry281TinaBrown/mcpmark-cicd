name: PR Automation Workflow
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint checks
        id: eslint
        run: |
          npm run lint
          if [ $? -ne 0 ]; then
            echo "eslint_failed=true" >> $GITHUB_ENV
          fi

      - name: Run Prettier formatting checks
        id: prettier
        run: |
          npx prettier --check .
          if [ $? -ne 0 ]; then
            echo "prettier_failed=true" >> $GITHUB_ENV
          fi

      - name: Post Code Quality Report as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const eslintStatus = process.env.eslint_failed ? "❌ Failed" : "✅ Passed";
            const prettierStatus = process.env.prettier_failed ? "❌ Failed" : "✅ Passed";
            
            const commentBody = `## Code Quality Report
            - **ESLint**: ${eslintStatus}
            - **Prettier**: ${prettierStatus}
            
            ${eslintStatus === "❌ Failed" ? "ESLint detected code quality issues. Please resolve these before merging." : ""}
            ${prettierStatus === "❌ Failed" ? "Prettier formatting issues found. Run \`npx prettier --write .\` to fix formatting." : ""}`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite with coverage
        id: tests
        run: |
          npm test -- --coverage
          if [ $? -ne 0 ]; then
            echo "tests_failed=true" >> $GITHUB_ENV
          fi

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn

      - name: Post Test Coverage Report as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const testStatus = process.env.tests_failed ? "❌ Failed" : "✅ Passed";
            
            const commentBody = `## Test Coverage Report
            - **Test Suite**: ${testStatus}
            
            ${testStatus === "❌ Failed" ? "Some tests failed. Review the test logs for details on failing tests." : "All tests passed successfully."}
            A full test coverage report is available as the "coverage-report" artifact attached to this workflow run.`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dependency vulnerability check (npm audit)
        id: npm-audit
        run: |
          npm audit --json > npm-audit-results.json
          if [ $? -ne 0 ]; then
            echo "vulnerabilities_found=true" >> $GITHUB_ENV
          fi

      - name: Scan for secrets in code changes
        id: secret-scan
        uses: trufflesecurity/trufflehog@v3.65.0
        with:
          path: .
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          format: json
          output: trufflehog-results.json
        continue-on-error: true

      - name: Post Security Scan Report as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const vulnStatus = process.env.vulnerabilities_found ? "❌ Vulnerabilities Detected" : "✅ No Vulnerabilities Found";
            let secretsStatus = "✅ No Secrets Detected";
            
            if (fs.existsSync('trufflehog-results.json')) {
              const secretResults = JSON.parse(fs.readFileSync('trufflehog-results.json', 'utf8'));
              if (secretResults.length > 0) {
                secretsStatus = "❌ Potential Secrets Detected";
              }
            }
            
            const commentBody = `## Security Scan Report
            - **Dependencies (npm audit)**: ${vulnStatus}
            - **Secret Scan**: ${secretsStatus}
            
            ${vulnStatus === "❌ Vulnerabilities Detected" ? "Review the npm audit results for details on vulnerable dependencies." : ""}
            ${secretsStatus === "❌ Potential Secrets Detected" ? "Check the TruffleHog scan results to ensure no sensitive information is included in the PR." : ""}`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        id: build
        run: |
          npm run build
          if [ $? -ne 0 ]; then
            echo "build_failed=true" >> $GITHUB_ENV
          fi

      - name: Validate application endpoints
        id: endpoint-check
        if: steps.build.outcome == 'success'
        run: |
          # Start the application in the background
          npm start &
          APP_PID=$!
          
          # Wait for the server to start (adjust sleep time as needed)
          sleep 15
          
          # Check a sample endpoint (update URL to match your application's endpoints)
          curl -f http://localhost:3000 || echo "endpoint_failed=true" >> $GITHUB_ENV
          
          # Stop the application
          kill $APP_PID

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: steps.build.outcome == 'success'
        with:
          name: build-artifacts
          path: build/
          if-no-files-found: warn

      - name: Post Build Validation Status as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = process.env.build_failed ? "❌ Failed" : "✅ Passed";
            const endpointStatus = process.env.endpoint_failed ? "❌ Failed" : (steps.build.outcome === 'success' ? "✅ Passed" : "⚠️ Not Run (Build Failed)");
            
            const commentBody = `## Build Validation
            - **Application Build**: ${buildStatus}
            - **Endpoint Validation**: ${endpointStatus}
            
            ${buildStatus === "❌ Failed" ? "The application build failed. Review the build logs to resolve issues." : ""}
            ${endpointStatus === "❌ Failed" ? "One or more application endpoints are not accessible. Verify the server setup and endpoint configuration." : ""}
            Build artifacts (if build succeeded) are available as the "build-artifacts" artifact attached to this workflow run.`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
